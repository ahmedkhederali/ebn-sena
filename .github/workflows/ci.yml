name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (lint + typecheck + tests)
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --workspace=backend --workspace=shared

      - name: TypeScript check
        run: npm run typecheck --workspace=backend

      - name: Lint
        run: npm run lint --workspace=backend

      - name: Tests
        run: npm test --workspace=backend
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/ibn-sina-test
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY_TEST }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY_TEST }}
          JWT_ACCESS_EXPIRY: 15m
          JWT_REFRESH_EXPIRY: 7d
          EMAIL_MOCK: 'true'
          SMS_PROVIDER: mock

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --workspace=frontend

      - name: TypeScript check
        run: npm run typecheck --workspace=frontend

      - name: Lint
        run: npm run lint --workspace=frontend

      - name: Build
        run: npm run build --workspace=frontend
        env:
          VITE_API_BASE_URL: http://localhost:4000/api

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t ibn-sina-backend:${{ github.sha }} .
